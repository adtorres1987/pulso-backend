services:
  db:
    image: postgres:16-alpine
    container_name: pulso-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pulso}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pulso_secret}
      POSTGRES_DB: ${POSTGRES_DB:-pulso_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pulso} -d ${POSTGRES_DB:-pulso_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
